<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口罩检测系统 - Mask Detection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #fff;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
  
  /* 头部 */
  header {
    text-align: center;
    padding: 28px 0 18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    margin-bottom: 30px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  header h1 {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }
  header p { color: rgba(255,255,255,0.55); font-size: 14px; margin-top: 6px; }

  /* 上传区域 */
  .upload-area {
    background: rgba(255,255,255,0.05);
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 50px 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 24px;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: #3a7bd5;
    background: rgba(58,123,213,0.1);
  }
  .upload-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.6;
  }
  .upload-area p { color: rgba(255,255,255,0.6); font-size: 15px; }
  .upload-area .sub { color: rgba(255,255,255,0.35); font-size: 13px; margin-top: 6px; }
  .upload-area input[type="file"] { display: none; }

  /* 状态栏 */
  .status-bar {
    display: flex; justify-content: center; align-items: center;
    min-height: 36px; margin-bottom: 18px;
    font-size: 14px; color: rgba(255,255,255,0.6);
  }
  .status-bar .spinner {
    display: none; width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #00d2ff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-bar.loading .spinner { display: inline-block; }
  .status-bar .error { color: #ff6b6b; }
  .status-bar .success { color: #51cf66; }

  /* 主内容区: 左右两栏 */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* 图片面板 */
  .panel {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .panel-header {
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 600;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-header .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
    font-weight: 400;
  }
  .panel-body {
    padding: 14px;
    min-height: 320px;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-body img {
    max-width: 100%; max-height: 420px;
    border-radius: 10px;
    display: none;
  }
  .panel-body .placeholder {
    color: rgba(255,255,255,0.25);
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
  }
  .panel-body img.show { display: block; }
  .panel-body .placeholder.hide { display: none; }

  /* 统计卡片 */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
  }
  .stat-card .label {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }
  .stat-card.green .num { color: #51cf66; }
  .stat-card.red .num { color: #ff6b6b; }
  .stat-card.blue .num { color: #339af0; }
  .stat-card.green { border-color: rgba(81,207,102,0.2); }
  .stat-card.red { border-color: rgba(255,107,107,0.2); }
  .stat-card.blue { border-color: rgba(51,154,240,0.2); }

  /* 检测结果列表 */
  .detect-list {
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    max-height: 200px;
    overflow-y: auto;
    padding: 10px 0;
  }
  .detect-list::-webkit-scrollbar { width: 4px; }
  .detect-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  .detect-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 16px;
    font-size: 13px;
    border-left: 3px solid transparent;
  }
  .detect-item .cls {
    font-weight: 600;
  }
  .detect-item .conf { color: rgba(255,255,255,0.5); }
  .detect-item.mask { border-left-color: #51cf66; }
  .detect-item.mask .cls { color: #51cf66; }
  .detect-item.nomask { border-left-color: #ff6b6b; }
  .detect-item.nomask .cls { color: #ff6b6b; }
  .empty-list {
    text-align: center; padding: 24px;
    color: rgba(255,255,255,0.3); font-size: 13px;
  }

  /* 按钮 */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 22px; border-radius: 10px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.25s ease;
    background: linear-gradient(90deg, #3a7bd5, #00d2ff);
    color: #fff;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(58,123,213,0.3); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-outline {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
  }
  .btn-outline:hover { background: rgba(255,255,255,0.08); box-shadow: none; }

  .action-row {
    display: flex; gap: 12px; justify-content: center;
    margin: 16px 0 4px;
  }

  /* 页脚 */
  footer { text-align: center; margin-top: 40px; padding: 20px 0; color: rgba(255,255,255,0.2); font-size: 12px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🛡️ 口罩检测系统</h1>
    <p>上传图片，AI 自动检测是否佩戴口罩 · Mask Detection via YOLOv5</p>
  </header>

  <!-- 上传区域 -->
  <div class="upload-area" id="dropZone">
    <div class="upload-icon">📁</div>
    <p><strong>点击选择图片</strong> 或拖拽文件到此处</p>
    <p class="sub">支持 JPG / PNG / BMP / WebP，最大 16MB</p>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/bmp,image/webp">
  </div>

  <!-- 状态栏 -->
  <div class="status-bar" id="statusBar">
    <span class="spinner"></span>
    <span id="statusText">等待上传...</span>
  </div>

  <!-- 操作按钮 -->
  <div class="action-row">
    <button class="btn" id="detectBtn" disabled>
      🔍 开始检测
    </button>
    <button class="btn btn-outline" id="resetBtn">
      🔄 重置
    </button>
  </div>

  <!-- 主内容 -->
  <div class="main-grid" style="margin-top: 20px;">
    <!-- 左侧：原图 -->
    <div class="panel">
      <div class="panel-header">
        <span>📷 原始图片</span>
        <span class="badge" id="originalName">未选择</span>
      </div>
      <div class="panel-body">
        <img id="originalImg" alt="原始图片">
        <div class="placeholder" id="originalPlaceholder">
          请上传一张含有人脸的图片<br>
          系统将自动检测口罩佩戴情况
        </div>
      </div>
    </div>

    <!-- 右侧：检测结果 -->
    <div class="panel">
      <div class="panel-header">
        <span>🎯 检测结果</span>
        <span class="badge" id="resultBadge">等待检测</span>
      </div>
      <div class="panel-body">
        <img id="resultImg" alt="检测结果">
        <div class="placeholder" id="resultPlaceholder">
          检测后的标注图片将显示在此处
        </div>
      </div>
    </div>
  </div>

  <!-- 统计信息 -->
  <div class="stats-grid" id="statsGrid" style="display: none; margin-top: 24px;">
    <div class="stat-card green">
      <div class="num" id="statMask">0</div>
      <div class="label">😷 已佩戴口罩</div>
    </div>
    <div class="stat-card red">
      <div class="num" id="statNoMask">0</div>
      <div class="label">⚠️ 未佩戴口罩</div>
    </div>
    <div class="stat-card blue">
      <div class="num" id="statTotal">0</div>
      <div class="label">👤 检测总人数</div>
    </div>
    <div class="stat-card blue">
      <div class="num" id="statAvgConf">0%</div>
      <div class="label">📊 平均置信度</div>
    </div>
  </div>

  <!-- 检测列表 -->
  <div class="panel" id="detailPanel" style="display: none; margin-top: 24px;">
    <div class="panel-header">
      <span>📋 检测明细</span>
      <span class="badge" id="detailCount">0 个目标</span>
    </div>
    <div class="detect-list" id="detectList"></div>
  </div>

  <footer>Powered by YOLOv5 · Flask · 口罩检测系统</footer>
</div>

<script>
  // ⚙️ 后端 API 地址配置
  // 本地运行: http://127.0.0.1:5000
  // VPS 运行: http://你的服务器IP:5000
  var API_BASE = 'http://127.0.0.1:5000';

  var dropZone = document.getElementById('dropZone');
  var dropZone = document.getElementById('dropZone');
  var fileInput = document.getElementById('fileInput');
  var originalImg = document.getElementById('originalImg');
  var resultImg = document.getElementById('resultImg');
  var originalPlaceholder = document.getElementById('originalPlaceholder');
  var resultPlaceholder = document.getElementById('resultPlaceholder');
  var originalName = document.getElementById('originalName');
  var statusBar = document.getElementById('statusBar');
  var statusText = document.getElementById('statusText');
  var detectBtn = document.getElementById('detectBtn');
  var resetBtn = document.getElementById('resetBtn');
  var statsGrid = document.getElementById('statsGrid');
  var detailPanel = document.getElementById('detailPanel');
  var detectList = document.getElementById('detectList');
  var detailCount = document.getElementById('detailCount');
  var resultBadge = document.getElementById('resultBadge');

  let currentFile = null;

  // ── 上传交互 ──
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

  // ── 处理文件 ──
  function handleFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['jpg','jpeg','png','bmp','webp'].includes(ext)) {
      setStatus('不支持的文件格式', 'error');
      return;
    }
    if (file.size > 16 * 1024 * 1024) {
      setStatus('图片过大，最大 16MB', 'error');
      return;
    }
    currentFile = file;
    originalName.textContent = file.name;
    const reader = new FileReader();
    reader.onload = (e) => {
      originalImg.src = e.target.result;
      originalImg.classList.add('show');
      originalPlaceholder.classList.add('hide');
      resetResults();
      detectBtn.disabled = false;
      setStatus(`已选择: ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`, 'success');
    };
    reader.readAsDataURL(file);
  }

  // ── 检测 ──
  detectBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    setStatus('正在检测中，请稍候...', 'loading');
    detectBtn.disabled = true;

    const formData = new FormData();
    formData.append('image', currentFile);

    try {
      const res = await fetch(API_BASE + '/predict', { method: 'POST', body: formData });
      const data = await res.json();
      if (!data.success) {
        setStatus(data.error || '检测失败', 'error');
        detectBtn.disabled = false;
        return;
      }

      // 显示结果图片
      resultImg.src = data.image;
      resultImg.classList.add('show');
      resultPlaceholder.classList.add('hide');
      resultBadge.textContent = `${data.detections.length} 个目标`;

      // 显示统计
      showStats(data.stats, data.detections);

      // 显示明细
      showDetections(data.detections);

      setStatus(`检测完成！共检测到 ${data.stats.total} 个人脸`, 'success');
    } catch (err) {
      setStatus('请求失败，请确保后端服务已启动', 'error');
    }
    detectBtn.disabled = false;
  });

  // ── 重置 ──
  resetBtn.addEventListener('click', () => {
    currentFile = null;
    fileInput.value = '';
    originalImg.classList.remove('show');
    resultImg.classList.remove('show');
    originalPlaceholder.classList.remove('hide');
    resultPlaceholder.classList.remove('hide');
    originalName.textContent = '未选择';
    resultBadge.textContent = '等待检测';
    detectBtn.disabled = true;
    statsGrid.style.display = 'none';
    detailPanel.style.display = 'none';
    detectList.innerHTML = '';
    setStatus('等待上传...', '');
  });

  function resetResults() {
    resultImg.classList.remove('show');
    resultPlaceholder.classList.remove('hide');
    resultBadge.textContent = '等待检测';
    statsGrid.style.display = 'none';
    detailPanel.style.display = 'none';
  }

  // ── 统计 ──
  function showStats(stats, detections) {
    document.getElementById('statMask').textContent = stats.mask || 0;
    document.getElementById('statNoMask').textContent = stats.nomask || 0;
    document.getElementById('statTotal').textContent = stats.total || 0;
    const avgConf = detections.length
      ? (detections.reduce((s, d) => s + d.confidence, 0) / detections.length * 100).toFixed(1)
      : 0;
    document.getElementById('statAvgConf').textContent = avgConf + '%';
    statsGrid.style.display = 'grid';
  }

  // ── 检测明细 ──
  function showDetections(detections) {
    detectList.innerHTML = '';
    detailPanel.style.display = 'block';
    detailCount.textContent = detections.length + ' 个目标';

    if (!detections.length) {
      detectList.innerHTML = '<div class="empty-list">未检测到目标</div>';
      return;
    }

    detections.forEach((d, i) => {
      const item = document.createElement('div');
      item.className = `detect-item ${d.class}`;
      const emoji = d.class === 'mask' ? '😷' : '⚠️';
      const clsLabel = d.class === 'mask' ? '已佩戴口罩' : '未佩戴口罩';
      item.innerHTML = `
        <div>
          <span class="cls">${emoji} ${clsLabel}</span>
          <span style="color:rgba(255,255,255,0.3);margin-left:8px;font-size:12px">#${i+1}</span>
        </div>
        <span class="conf">${(d.confidence * 100).toFixed(1)}%</span>
      `;
      detectList.appendChild(item);
    });
  }

  // ── 状态 ──
  function setStatus(msg, type) {
    statusText.textContent = msg;
    statusBar.className = 'status-bar';
    if (type === 'loading') statusBar.classList.add('loading');
    else if (type === 'error') statusText.className = 'error';
    else if (type === 'success') statusText.className = 'success';
    else statusText.className = '';
  }
</script>
</body>
</html>
